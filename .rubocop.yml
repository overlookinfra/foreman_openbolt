inherit_gem:
  theforeman-rubocop:
    - default.yml
    - rules/style_lenient.yml

AllCops:
  TargetRubyVersion: 3.0
  Exclude:
    - '**/*.spec'
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - '.vendor/**/*'

require:
  - rubocop-rake

Rails/RakeEnvironment:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Layout/LineLength:
  Max: 160
