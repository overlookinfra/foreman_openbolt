---
name: Test

on:
  pull_request: {}
  push:
    branches:
      - main

env:
  BUNDLE_WITHOUT: release

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps --loglevel=error
      - name: Run linters
        run: bundle exec rake lint

  gem_build_matrix:
    runs-on: ubuntu-latest
    outputs:
      ruby: ${{ steps.ruby.outputs.versions }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: ruby
        uses: voxpupuli/ruby-version@be0467ce7366d206b2e87f5b7a032a030120b7cb # 2.0.0

  gem_build_test:
    runs-on: ubuntu-latest
    needs: gem_build_matrix
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ fromJSON(needs.gem_build_matrix.outputs.ruby) }}
    name: Ruby ${{ matrix.ruby }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Verify gem builds
        run: gem build --strict --verbose *.gemspec

  unit_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        foreman_version:
          - '3.17'
          - '3.18'
          - '3.19'
          - develop
    name: Unit tests (Foreman ${{ matrix.foreman_version }})
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.0"
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: test/unit/docker/Dockerfile
          build-args: FOREMAN_BRANCH=${{ matrix.foreman_version == 'develop' && 'develop' || format('{0}-stable', matrix.foreman_version) }}
          cache-from: type=gha,scope=test-${{ matrix.foreman_version }}
          cache-to: type=gha,mode=max,scope=test-${{ matrix.foreman_version }}
          load: true
          tags: foreman-openbolt-test:${{ matrix.foreman_version == 'develop' && 'develop' || format('{0}-stable', matrix.foreman_version) }}

      - name: Set up test infrastructure
        run: FOREMAN_VERSION=${{ matrix.foreman_version }} bundle exec rake test:unit:up

      - name: Run Ruby unit tests
        run: bundle exec rake test:unit:ruby

      - name: Run JavaScript unit tests
        run: bundle exec rake test:unit:js

      - name: Stop test containers
        if: always()
        run: bundle exec rake test:unit:down

  tests:
    if: always()
    needs:
      - lint
      - gem_build_test
      - unit_test
    runs-on: ubuntu-24.04
    name: Test suite
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
