---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0)'
        required: true
        type: string

permissions: {}

jobs:
  create-tag:
    name: Create tag
    runs-on: ubuntu-24.04
    # Prevent releases from forked repositories
    if: github.repository_owner == 'overlookinfra'
    permissions:
      contents: write
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' must be in X.Y.Z format"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify source version matches release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! grep -q "VERSION = '$VERSION'" lib/foreman_openbolt/version.rb; then
            echo "::error::version.rb does not contain version '$VERSION'. Did you merge the prepare-release PR?"
            exit 1
          fi
          if ! grep -q "\"version\": \"$VERSION\"" package.json; then
            echo "::error::package.json does not contain version '$VERSION'. Did you merge the prepare-release PR?"
            exit 1
          fi

      - name: Check tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$(git tag -l "$VERSION")" ]; then
            echo "::error::Tag '$VERSION' already exists"
            exit 1
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

  build-release:
    needs: create-tag
    name: Build the gem
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 'ruby'
      - name: Build gem
        shell: bash
        run: gem build --verbose *.gemspec
      - name: Upload gem to GitHub cache
        uses: actions/upload-artifact@v7
        with:
          name: gem-artifact
          path: '*.gem'
          retention-days: 1
          compression-level: 0

  create-github-release:
    needs: build-release
    name: Create GitHub release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # clone repo and create release
    steps:
      - name: Download gem from GitHub cache
        uses: actions/download-artifact@v8
        with:
          name: gem-artifact
      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create --repo ${{ github.repository }} "$VERSION" --generate-notes *.gem

  release-to-github:
    needs: build-release
    name: Release to GitHub
    runs-on: ubuntu-24.04
    permissions:
      packages: write # publish to rubygems.pkg.github.com
    steps:
      - name: Download gem from GitHub cache
        uses: actions/download-artifact@v8
        with:
          name: gem-artifact
      - name: Publish gem to GitHub packages
        run: gem push --host https://rubygems.pkg.github.com/${{ github.repository_owner }} *.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.GITHUB_TOKEN }}

  release-to-rubygems:
    needs: build-release
    name: Release gem to rubygems.org
    runs-on: ubuntu-24.04
    environment: release # recommended by rubygems.org
    permissions:
      id-token: write # rubygems.org authentication
    steps:
      - name: Download gem from GitHub cache
        uses: actions/download-artifact@v8
        with:
          name: gem-artifact
      - uses: rubygems/configure-rubygems-credentials@v2.0.0
      - name: Publish gem to rubygems.org
        shell: bash
        run: gem push *.gem

  release-verification:
    name: Check that all releases are done
    runs-on: ubuntu-24.04
    permissions:
      contents: read # minimal permissions that we have to grant
    needs:
      - create-github-release
      - release-to-github
      - release-to-rubygems
    steps:
      - name: Download gem from GitHub cache
        uses: actions/download-artifact@v8
        with:
          name: gem-artifact
      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 'ruby'
      - name: Wait for release to propagate
        shell: bash
        run: |
          gem install rubygems-await
          gem await *.gem
